version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: visionkirana_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vision_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vision_secret_pass}
      POSTGRES_DB: ${POSTGRES_DB:-visionkirana}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vision_user} -d ${POSTGRES_DB:-visionkirana}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: visionkirana_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-vision_user}:${POSTGRES_PASSWORD:-vision_secret_pass}@db:5432/${POSTGRES_DB:-visionkirana}
      - SECRET_KEY=${SECRET_KEY:-default_insecure_key_change_in_production}
      - BACKEND_CORS_ORIGINS=["http://localhost:5173", "http://localhost:80"]
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: visionkirana_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
